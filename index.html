<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HyperClick - Auto App Clicker</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: linear-gradient(135deg, #1a237e 0%, #3949ab 50%, #5c6bc0 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 24px;
            padding: 48px;
            max-width: 500px;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }
        .logo {
            width: 120px;
            height: 120px;
            background: linear-gradient(135deg, #1a237e, #3949ab);
            border-radius: 28px;
            margin: 0 auto 24px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 48px;
        }
        h1 {
            color: #1a237e;
            font-size: 32px;
            margin-bottom: 8px;
        }
        .subtitle {
            color: #5c6bc0;
            font-size: 18px;
            margin-bottom: 24px;
        }
        .description {
            color: #555;
            line-height: 1.8;
            margin-bottom: 32px;
        }
        .play-button {
            display: inline-flex;
            align-items: center;
            gap: 12px;
            background: #000;
            color: #fff;
            padding: 14px 28px;
            border-radius: 12px;
            text-decoration: none;
            font-size: 16px;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .play-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.3);
        }
        .play-icon {
            width: 24px;
            height: 24px;
        }
        .links {
            margin-top: 32px;
            padding-top: 24px;
            border-top: 1px solid #eee;
        }
        .links a {
            color: #3949ab;
            text-decoration: none;
            margin: 0 12px;
            font-size: 14px;
        }
        .links a:hover {
            text-decoration: underline;
        }
        .contact {
            margin-top: 24px;
            color: #888;
            font-size: 13px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">👆</div>
        <h1>HyperClick</h1>
        <p class="subtitle">Auto App Clicker</p>
        <p class="description">
            반복 작업을 자동화하는 스마트 오토클리커입니다.<br>
            게임, 업무, 테스트 등 다양한 용도로 활용하세요.
        </p>
        <a href="https://play.google.com/store/apps/details?id=com.aram.hyperclick" class="play-button">
            <svg class="play-icon" viewBox="0 0 24 24" fill="currentColor">
                <path d="M3,20.5V3.5C3,2.91 3.34,2.39 3.84,2.15L13.69,12L3.84,21.85C3.34,21.61 3,21.09 3,20.5M16.81,15.12L6.05,21.34L14.54,12.85L16.81,15.12M20.16,10.81C20.5,11.08 20.75,11.5 20.75,12C20.75,12.5 20.5,12.92 20.16,13.19L17.89,14.5L15.39,12L17.89,9.5L20.16,10.81M6.05,2.66L16.81,8.88L14.54,11.15L6.05,2.66Z"/>
            </svg>
            Google Play에서 다운로드
        </a>
        <div class="links">
            <a href="privacy.html">개인정보처리방침</a>
            <a href="terms.html">이용약관</a>
            <a href="data-deletion.html">데이터 삭제 요청</a>
        </div>
        <p class="contact">
            문의: hyperclick.customer@gmail.com
        </p>
    </div>
</body>
</html>
